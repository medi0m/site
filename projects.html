<script>
document.getElementById('year').textContent = new Date().getFullYear();

let activeFilter = 'all';

function renderFilterBar(){
  const lang = getLang();
  const bar = document.getElementById('filter-bar');
  const cats = ['all', ...Object.keys(CAREER_DATA)];
  bar.innerHTML = cats.map(key => {
    const label = key === 'all' ? t('projects.filterAll') : CAREER_DATA[key].title[lang];
    const icon = key === 'all' ? '✨' : CAREER_DATA[key].icon;
    return `<button type="button" class="filter-chip${key === activeFilter ? ' active' : ''}" data-cat="${key}">${icon} ${label}</button>`;
  }).join('');
  bar.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.getAttribute('data-cat');
      renderFilterBar();
      renderGrid();
    });
  });
}

function renderGrid(){
  const lang = getLang();
  const grid = document.getElementById('resource-grid');
  const items = RESOURCES.filter(r => activeFilter === 'all' || r.category === activeFilter);
  grid.innerHTML = items.map(r => `
    <div class="card ${CAREER_DATA[r.category].tone}">
      <div class="ico">${CAREER_DATA[r.category].icon}</div>
      <span class="pill" style="background:var(--surface-alt);color:var(--text-muted);margin-bottom:10px;">${TYPE_LABELS[r.type][lang]}</span>
      <h3>${r.title[lang]}</h3>
      <p>${r.desc[lang]}</p>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  renderFilterBar();
  renderGrid();
});
document.addEventListener('uniway:langchange', () => { renderFilterBar(); renderGrid(); });
</script>
</body>
